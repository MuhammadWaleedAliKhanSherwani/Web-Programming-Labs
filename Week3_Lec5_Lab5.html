<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Lab5 - Form</h1>

    <form action="" method="">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required minlength="2" pattern="[A-Za-z\s]+" placeholder="Enter your full name"> <br>

            <label for="email">Email:</label>
            <input type="email" required id="email" name="email" placeholder="Enter your email address">

            <label for="password">Password:</label>
            <input type="password" required id="password" name="password" minlength="8" placeholder="Enter a password (min 8 characters)"> <br>

            <label for="date">Date of Birth:</label>
            <input type="date" required id="date" name="date"> <br>

            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label> <br>
        </fieldset>

        <fieldset>
            <legend>Preferences</legend>
            <label for="country">Country:</label>
            <select name="country" id="country">
                <option value="">Select your country</option>
                <option value="Pakistan">Pakistan</option>
                <option value="India">India</option>
                <option value="USA">USA</option>
                <option value="UK">UK</option>
                <option value="Australia">Australia</option>
            </select> <br>
            <label for="subscribe">I agree to Terms & Conditions</label>
            <input type="checkbox" id="subscribe" name="subscribe" value="yes" required> <br>
        </fieldset>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
